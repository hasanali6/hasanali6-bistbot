name: BIST Sinyal Tarama

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 09:00 TR (Pzt-Cuma)
    - cron: '0 9 * * 1-5'   # 12:00 TR
    - cron: '0 15 * * 1-5'  # 18:00 TR
    - cron: '0 18 * * 1-5'  # 21:00 TR
  workflow_dispatch:          # Manuel tetikleme butonu

jobs:
  tara:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri yükle
        run: |
          pip install yfinance pandas numpy requests

      - name: BIST Tarama
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python gha_tarama.py
