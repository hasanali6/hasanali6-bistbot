name: BIST Sinyal Tarama

on:
  schedule:
    - cron: '0 6 * * 1-5'    # 09:00 TR (UTC+3)
    - cron: '0 8 * * 1-5'    # 11:00 TR
    - cron: '0 10 * * 1-5'   # 13:00 TR
    - cron: '0 12 * * 1-5'   # 15:00 TR
    - cron: '0 14 * * 1-5'   # 17:00 TR
  workflow_dispatch:          # Elle de başlatılabilir

jobs:
  tara:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri yükle
        run: pip install yfinance pandas numpy requests

      - name: BIST Tarama + Portföy Kontrolü
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOY:          ${{ secrets.PORTFOY }}
        run: python gha_tarama.py
